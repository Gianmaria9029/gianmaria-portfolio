<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagina non trovata — Gianmaria Gori</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      text-align: center;
      max-width: 480px;
    }

    .code {
      font-size: clamp(6rem, 20vw, 10rem);
      font-weight: 900;
      line-height: 1;
      color: #fff;
      letter-spacing: -0.05em;
      opacity: 0.08;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      user-select: none;
    }

    .wrapper {
      position: relative;
    }

    h1 {
      font-size: clamp(1.2rem, 4vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      margin-bottom: 0.75rem;
    }

    .line {
      width: 40px;
      height: 1px;
      background: #fff;
      opacity: 0.3;
      margin: 1.5rem auto;
    }

    p {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.45);
      line-height: 1.7;
      margin-bottom: 2.5rem;
      font-family: system-ui, sans-serif;
    }

    a {
      display: inline-block;
      padding: 0.75rem 2rem;
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff;
      text-decoration: none;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: border-color 0.2s, color 0.2s;
    }

    a:hover {
      border-color: #fff;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <span class="code" aria-hidden="true">404</span>
    <div class="container">
      <h1>Pagina non trovata</h1>
      <div class="line"></div>
      <p>L'URL che hai cercato non esiste o è stato rimosso.<br>Torna alla home per esplorare il portfolio.</p>
      <a href="https://gianmaria9029.github.io/gianmaria-portfolio/">← Torna al portfolio</a>
    </div>
  </div>
</body>
</html>
